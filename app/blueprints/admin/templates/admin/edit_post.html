{% extends "base.html" %} {% block content %}
<div
  style="background-color: #0f172a; min-height: 100vh; width: 100%"
  class="animate-fade-in"
>
  <div class="max-w-4xl mx-auto px-6 py-16">
    <div class="flex items-center justify-between mb-8">
      <a
        href="{{ url_for('admin.dashboard') }}"
        class="text-white/50 hover:text-white transition-colors text-sm uppercase font-bold tracking-widest"
      >
        <i class="fa-solid fa-arrow-left mr-2"></i> Quay lại Dashboard
      </a>
      <h2 class="text-2xl font-black text-white uppercase">
        Chỉnh sửa bài viết
      </h2>
    </div>

    <form
      method="POST"
      enctype="multipart/form-data"
      class="glass-card p-8 rounded-[2.5rem] space-y-6"
    >
      <div>
        <label class="block text-[#d4af37] text-xs font-bold uppercase mb-2"
          >Tiêu đề bài viết</label
        >
        <input
          type="text"
          name="title"
          value="{{ post.title }}"
          required
          class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500 transition-all"
        />
      </div>

      <div>
        <label class="block text-[#d4af37] text-xs font-bold uppercase mb-2"
          >Nội dung chi tiết</label
        >
        <div class="editor-container text-black">
          <textarea name="content" id="editor">
{{ post.content | safe }}</textarea
          >
        </div>
      </div>

      <div class="flex gap-4">
        <button
          type="submit"
          class="flex-1 p-4 cv-button text-white font-bold rounded-2xl shadow-lg hover:scale-[1.02] transition-all"
        >
          LƯU THAY ĐỔI
        </button>
        <a
          href="{{ url_for('admin.dashboard') }}"
          class="p-4 bg-white/5 text-white/50 font-bold rounded-2xl hover:bg-white/10 transition-all"
        >
          HỦY
        </a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
<script>
  tinymce.init({
    selector: '#editor',
    plugins: 'advlist autolink lists link image charmap preview anchor pagebreak searchreplace wordcount visualblocks visualchars code fullscreen insertdatetime media table emoticons',
    toolbar: 'undo redo | blocks fontfamily fontsize | bold italic underline strikethrough | alignleft aligncenter alignright alignjustify | link image media table | bullist numlist outdent indent | forecolor backcolor emoticons | code preview fullscreen',
    height: 600,
    menubar: 'file edit view insert format tools table',
    content_style: 'body { background: #1e293b; color: #e2e8f0; font-family: Inter, sans-serif; font-size: 15px; } img { max-width: 100%; height: auto; border-radius: 15px; }',
    images_upload_handler: function (blobInfo, progress) {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', "{{ url_for('admin.upload_image_content') }}");
            xhr.upload.onprogress = (e) => { progress(e.loaded / e.total * 100); };
            xhr.onload = () => {
                if (xhr.status < 200 || xhr.status >= 300) { return reject('HTTP Error: ' + xhr.status); }
                const json = JSON.parse(xhr.responseText);
                if (!json || typeof json.url != 'string') { return reject('Invalid JSON: ' + xhr.responseText); }
                resolve(json.url);
            };
            xhr.onerror = () => { reject('Image upload failed.'); };
            const formData = new FormData();
            formData.append('upload', blobInfo.blob(), blobInfo.filename());
            xhr.send(formData);
        });
    },
    setup: function (editor) {
        editor.on('change', function () {
            editor.save();
        });
    }
  });
</script>

<style>
  .tox-tinymce { border-radius: 15px !important; border: 1px solid rgba(255,255,255,0.1) !important; }
  .tox .tox-menubar, .tox .tox-toolbar, .tox .tox-toolbar__overflow, .tox .tox-toolbar__primary {
    background: #1e293b !important;
  }
  .tox .tox-tbtn, .tox .tox-mbtn { color: #94a3b8 !important; }
  .tox .tox-tbtn:hover, .tox .tox-mbtn:hover { background: #334155 !important; color: #e2e8f0 !important; }
  .tox .tox-statusbar { background: #0f172a !important; border-top: 1px solid rgba(255,255,255,0.05) !important; color: #64748b !important; }
  .tox .tox-statusbar__text-container { color: #64748b !important; }
  .mce-content-body img { max-width: 100%; height: auto; border-radius: 15px; }
</style>
{% endblock %}
