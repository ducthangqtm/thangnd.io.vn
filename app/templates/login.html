{% extends "base.html" %} {% block content %}
<div class="max-w-md mx-auto">
  <div class="glass rounded-3xl p-10 shadow-2xl border border-white/10">
    <div class="text-center mb-8">
      <div
        class="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-blue-500/20"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-8 w-8 text-blue-500"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
          />
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-white">Hệ thống Nội bộ</h2>
      <p class="text-gray-500 text-sm mt-1">
        Chào Sếp Thắng, vui lòng xác thực.
      </p>
    </div>

    <form action="/login" method="POST" class="space-y-6">
      <div>
        <label class="block text-xs font-bold uppercase text-gray-500 mb-2 ml-1"
          >Tên đăng nhập</label
        >
        <input
          type="text"
          name="username"
          required
          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition"
        />
      </div>

      <div>
        <label class="block text-xs font-bold uppercase text-gray-500 mb-2 ml-1"
          >Mật khẩu</label
        >
        <input
          type="password"
          name="password"
          required
          class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-95"
      >
        Xác thực danh tính
      </button>
    </form>

    <div class="mt-6 text-center">
      <a
        href="/"
        class="text-xs text-gray-600 hover:text-gray-400 transition underline underline-offset-4"
      >
        Quay lại Trang chủ
      </a>
    </div>
  </div>
</div>
{% endblock %}
