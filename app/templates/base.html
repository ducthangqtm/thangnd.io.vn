<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Nguyễn Đức Thắng - IT Network Engineer</title>

    <meta
      name="description"
      content="Portfolio cá nhân của Nguyễn Đức Thắng - Chuyên gia IT Network, Python Automation tại Bắc Ninh."
    />
    <meta
      name="keywords"
      content="Nguyễn Đức Thắng, Thắng IT, Network Engineer, Bắc Ninh, Python Flask"
    />
    <meta name="author" content="Nguyễn Đức Thắng" />

    <meta
      property="og:title"
      content="Nguyễn Đức Thắng - IT Network Engineer"
    />
    <meta
      property="og:description"
      content="Chuyên gia hạ tầng mạng & Tự động hóa tại Bắc Ninh"
    />
    <meta
      property="og:image"
      content="{{ url_for('static', filename='img/thangnd.png') }}"
    />
    <meta property="og:url" content="https://thangnd.io.vn" />
    <meta property="og:type" content="website" />

    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='img/logo.png') }}"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}?v=2.1"
    />
  </head>

  <body class="bg-[#020617] min-h-screen text-slate-200">
    <!-- Animated Background Blobs -->
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
      <div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] rounded-full bg-blue-600/20 mix-blend-screen filter blur-[100px] animate-blob"></div>
      <div class="absolute top-[20%] right-[-10%] w-[35vw] h-[35vw] rounded-full bg-indigo-600/20 mix-blend-screen filter blur-[100px] animate-blob animation-delay-2000"></div>
      <div class="absolute bottom-[-20%] left-[20%] w-[50vw] h-[50vw] rounded-full bg-purple-600/20 mix-blend-screen filter blur-[120px] animate-blob animation-delay-4000"></div>
    </div>

    <nav
      class="fixed top-0 left-0 right-0 z-50 bg-[#020617]/80 backdrop-blur-xl border-b border-white/5 transition-all duration-300"
    >
      <div
        class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between"
      >
        <a href="/" class="flex items-center gap-2 flex-shrink-0">
          <img
            src="{{ url_for('static', filename='img/logo.png') }}"
            alt="Logo"
            class="w-8 h-8 object-contain"
          />
          <span
            class="text-white font-black uppercase tracking-tighter text-[10px] md:text-xs"
          >
            Thangnd.io.vn
          </span>
        </a>

        <div class="flex items-center gap-2 md:gap-4">
          {% if current_user.is_authenticated %}
          <div
            class="flex items-center gap-1.5 px-2 py-1 bg-white/5 rounded-lg border border-white/10"
          >
            <div
              class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"
            ></div>
            <span
              class="text-[9px] md:text-[10px] font-bold text-[#d4af37] whitespace-nowrap"
            >
              Hi, {{ current_user.name if current_user.name else
              current_user.username }}
            </span>
          </div>

          {% if current_user.role in ['admin', 'mod'] %}
          <a
            href="/thangnd-dashboard"
            class="flex items-center text-[10px] font-bold uppercase tracking-widest {{ 'text-[#d4af37]' if current_user.role == 'admin' else 'text-blue-400' }}"
          >
            <i
              class="fa-solid {{ 'fa-crown' if current_user.role == 'admin' else 'fa-user-shield' }} mr-1"
            ></i>
            <span class="hidden xs:inline">{{ current_user.role }}</span>
          </a>
          {% endif %}

          <div class="h-4 w-[1px] bg-white/10"></div>

          <a
            href="/logout"
            class="text-red-400/60 hover:text-red-400 transition-colors"
          >
            <i class="fa-solid fa-power-off text-xs"></i>
          </a>

          {% else %}
          <div
            class="flex items-center gap-3 text-[10px] font-bold uppercase tracking-widest"
          >
            <a href="/login" class="text-white/60 hover:text-blue-400">Login</a>
            <a href="/register" class="text-[#d4af37]">Register</a>
          </div>
          {% endif %}
        </div>
      </div>
    </nav>

    <div class="h-16"></div>

    {% block content %}{% endblock %}
  </body>
</html>
