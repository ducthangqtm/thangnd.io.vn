{% extends "base.html" %} {% block content %}
<div class="max-w-2xl mx-auto px-4 py-16 flex flex-col items-center">
  <div class="relative mb-8">
    <div
      class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-cyan-400 rounded-[3rem] blur opacity-20"
    ></div>
    <img
      src="{{ url_for('static', filename='img/thangnd.png') }}"
      class="relative w-40 h-40 rounded-[2.5rem] object-cover border-4 border-white shadow-2xl"
    />
  </div>

  <div class="text-center mb-12">
    <h1 class="text-4xl font-black text-slate-900 tracking-tight uppercase">
      Nguyễn Đức Thắng
    </h1>
    <p class="text-blue-600 font-bold text-sm mt-2 uppercase tracking-[0.2em]">
      IT Network Engineer
    </p>
    <p class="text-slate-500 mt-6 max-w-sm mx-auto leading-relaxed">
      Chuyên gia tối ưu hạ tầng mạng, đam mê tự động hóa và phát triển ứng dụng
      Python/Flask tại Bắc Ninh.
    </p>
  </div>

  <div class="w-full space-y-4">
    <a
      href="{{ social.facebook }}"
      target="_blank"
      class="flex items-center justify-between p-5 bg-white border border-slate-100 rounded-3xl shadow-sm hover:shadow-md hover:border-blue-200 transition-all group"
    >
      <div class="flex items-center gap-4">
        <div
          class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600"
        >
          <i class="fab fa-facebook-f text-xl"></i>
        </div>
        <span class="font-bold text-slate-700">Facebook</span>
      </div>
      <span
        class="text-slate-300 group-hover:translate-x-1 transition-transform"
        >→</span
      >
    </a>

    <a
      href="{{ social.zalo }}"
      target="_blank"
      class="flex items-center justify-between p-5 bg-white border border-slate-100 rounded-3xl shadow-sm hover:shadow-md hover:border-blue-200 transition-all group"
    >
      <div class="flex items-center gap-4">
        <div
          class="w-12 h-12 bg-cyan-50 rounded-2xl flex items-center justify-center text-cyan-600 font-black text-xs"
        >
          ZALO
        </div>
        <span class="font-bold text-slate-700">Zalo Cá Nhân</span>
      </div>
      <span
        class="text-slate-300 group-hover:translate-x-1 transition-transform"
        >→</span
      >
    </a>

    <a
      href="{{ social.x }}"
      target="_blank"
      class="flex items-center justify-between p-5 bg-white border border-slate-100 rounded-3xl shadow-sm hover:shadow-md hover:border-slate-300 transition-all group"
    >
      <div class="flex items-center gap-4">
        <div
          class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white"
        >
          <i class="fab fa-x-twitter text-xl"></i>
        </div>
        <span class="font-bold text-slate-700">X (Twitter)</span>
      </div>
      <span
        class="text-slate-300 group-hover:translate-x-1 transition-transform"
        >→</span
      >
    </a>
  </div>

  <div
    class="mt-16 text-slate-400 text-[10px] font-medium uppercase tracking-widest"
  >
    © 2026 THANGND.IO.VN • POWERED BY FLASK
  </div>
</div>
{% endblock %}
