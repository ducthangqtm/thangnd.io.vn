{% extends "base.html" %} {% block content %}
<div
  style="background-color: #0f172a; min-height: 100vh; width: 100%"
  class="animate-fade-in"
>
  <div class="max-w-4xl mx-auto px-6 py-16">
    <div class="flex items-center justify-between mb-8">
      <a
        href="{{ url_for('dashboard') }}"
        class="text-white/50 hover:text-white transition-colors text-sm uppercase font-bold tracking-widest"
      >
        <i class="fa-solid fa-arrow-left mr-2"></i> Quay lại Dashboard
      </a>
      <h2 class="text-2xl font-black text-white uppercase">
        Chỉnh sửa bài viết
      </h2>
    </div>

    <form
      method="POST"
      enctype="multipart/form-data"
      class="glass-card p-8 rounded-[2.5rem] space-y-6"
    >
      <div>
        <label class="block text-[#d4af37] text-xs font-bold uppercase mb-2"
          >Tiêu đề bài viết</label
        >
        <input
          type="text"
          name="title"
          value="{{ post.title }}"
          required
          class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500 transition-all"
        />
      </div>

      <div>
        <label class="block text-[#d4af37] text-xs font-bold uppercase mb-2"
          >Nội dung chi tiết</label
        >
        <div class="editor-container text-black">
          <textarea name="content" id="editor">
{{ post.content | safe }}</textarea
          >
        </div>
      </div>

      <div class="flex gap-4">
        <button
          type="submit"
          class="flex-1 p-4 cv-button text-white font-bold rounded-2xl shadow-lg hover:scale-[1.02] transition-all"
        >
          LƯU THAY ĐỔI
        </button>
        <a
          href="{{ url_for('dashboard') }}"
          class="p-4 bg-white/5 text-white/50 font-bold rounded-2xl hover:bg-white/10 transition-all"
        >
          HỦY
        </a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
<script>
  ClassicEditor.create(document.querySelector("#editor"), {
    toolbar: [
      "heading",
      "|",
      "bold",
      "italic",
      "link",
      "uploadImage",
      "insertTable",
      "blockQuote",
      "bulletedList",
      "numberedList",
      "|",
      "undo",
      "redo",
    ],
    ckfinder: {
      uploadUrl: "{{ url_for('upload_image_content') }}",
    },
  }).catch((error) => {
    console.error(error);
  });
</script>

<style>
  .ck-editor__editable {
    min-height: 450px;
    border-radius: 0 0 15px 15px !important;
  }
  .ck-toolbar {
    border-radius: 15px 15px 0 0 !important;
    background: rgba(255, 255, 255, 0.9) !important;
  }
  .ck-content img {
    max-width: 100%;
    height: auto;
    border-radius: 15px;
  }
</style>
{% endblock %}
