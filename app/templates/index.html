{% extends "base.html" %} {% block content %}
<div class="animate-fade-in relative z-10 w-full min-h-[calc(100vh-4rem)]">
  <div class="max-w-2xl mx-auto px-6 py-16 flex flex-col items-center">
    <div class="relative mb-10 group">
      <!-- Glow effect -->
      <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 rounded-[3rem] blur-lg opacity-60 group-hover:opacity-100 transition duration-500 group-hover:scale-105"></div>
      <div class="relative p-1 rounded-[2.8rem] bg-gradient-to-b from-[#020617] to-slate-800 border border-white/10 shadow-2xl">
        <img
          src="{{ url_for('static', filename='img/thangnd.png') }}"
          class="w-40 h-40 rounded-[2.5rem] object-cover"
        />
      </div>
    </div>

    <div class="text-center mb-12 flex flex-col items-center">
      <h1 class="text-3xl font-black tracking-tight uppercase text-gradient mb-2">
        Nguyễn Đức Thắng
      </h1>
      <p
        class="text-gradient-gold font-bold text-sm mt-2 uppercase tracking-[0.2em]"
      >
        IT Network Engineer
      </p>
    </div>

    <div class="w-full space-y-4 flex flex-col items-center">
      <a
        href="/cv"
        class="flex items-center justify-between p-5 cv-button border-none rounded-3xl shadow-lg transition-all group w-full"
      >
        <div class="flex items-center gap-4 text-left text-white">
          <div
            class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center"
          >
            <i class="fa-solid fa-file-contract text-xl"></i>
          </div>
          <div>
            <p class="font-bold uppercase leading-tight text-sm md:text-base">
              Hồ Sơ Chuyên Môn
            </p>
            <p class="text-white/70 text-[10px] uppercase font-medium">
              10+ năm kinh nghiệm trong lĩnh vực IT Network
            </p>
          </div>
        </div>
        <span
          class="text-white/50 group-hover:translate-x-1 transition-transform"
          >→</span
        >
      </a>

      <a
        href="/blog"
        class="blog-button p-5 border-none rounded-3xl shadow-lg transition-all group w-full"
      >
        <div class="flex items-center gap-4 text-left text-white">
          <div
            class="w-12 h-12 bg-blue-500/20 rounded-2xl flex items-center justify-center text-blue-400"
          >
            <i class="fa-solid fa-robot text-xl"></i>
          </div>
          <div>
            <p class="font-bold uppercase leading-tight text-sm md:text-base">
              AI & Kỹ thuật
            </p>
            <p class="text-white/70 text-[10px] uppercase font-medium">
              Góc chia sẻ kiến thức tự động bởi AI
            </p>
          </div>
        </div>
        <span
          class="text-white/50 group-hover:translate-x-1 transition-transform"
          >→</span
        >
      </a>

      <div
        class="flex flex-nowrap justify-center items-center gap-3 md:gap-6 pt-6 w-full"
      >
        <a
          href="{{ social.facebook }}"
          target="_blank"
          class="w-14 h-14 md:w-16 md:h-16 glass-card rounded-2xl flex items-center justify-center text-[#1877F2] hover:scale-110 transition-all flex-shrink-0"
        >
          <i class="fab fa-facebook text-2xl md:text-3xl"></i>
        </a>
        <a
          href="{{ social.zalo }}"
          target="_blank"
          class="w-14 h-14 md:w-16 md:h-16 glass-card rounded-2xl flex items-center justify-center text-[#3b82f6] font-black text-[10px] md:text-xs hover:scale-110 transition-all flex-shrink-0"
          >ZALO</a
        >
        <a
          href="{{ social.telegram }}"
          target="_blank"
          class="w-14 h-14 md:w-16 md:h-16 glass-card rounded-2xl flex items-center justify-center text-[#24A1DE] hover:scale-110 transition-all flex-shrink-0"
        >
          <i class="fab fa-telegram text-2xl md:text-3xl"></i>
        </a>
        <a
          href="{{ social.discord }}"
          target="_blank"
          class="w-14 h-14 md:w-16 md:h-16 glass-card rounded-2xl flex items-center justify-center text-[#5865F2] hover:scale-110 transition-all flex-shrink-0"
        >
          <i class="fab fa-discord text-2xl md:text-3xl"></i>
        </a>
        <a
          href="{{ social.whatsapp }}"
          target="_blank"
          class="w-14 h-14 md:w-16 md:h-16 glass-card rounded-2xl flex items-center justify-center text-[#25D366] p-3.5 md:p-4 hover:scale-110 transition-all flex-shrink-0"
        >
          <i class="fab fa-whatsapp text-2xl md:text-3xl"></i>
        </a>
        <a
          href="{{ social.x }}"
          target="_blank"
          class="w-14 h-14 md:w-16 md:h-16 glass-card rounded-2xl flex items-center justify-center text-white p-3.5 md:p-4 hover:scale-110 transition-all flex-shrink-0"
        >
          <i class="fa-brands fa-x-twitter text-2xl md:text-3xl"></i>
        </a>
      </div>
    </div>

    <div class="mt-20">
      <div
        class="text-slate-600 text-[10px] font-bold uppercase tracking-[0.3em] text-center"
      >
        © 2026 THANGND.IO.VN • POWERED BY FLASK
      </div>
    </div>
  </div>
</div>
{% endblock %}
