<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - Lịch Thi Đấu &amp; Kết Quả</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('wc2026.static', filename='css/style.css') }}">
</head>
<body>

    <!-- MINI TOP NAV -->
    <div class="mini-topnav">
        <a href="{{ url_for('main.index') }}" class="mini-topnav-brand">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo" class="mini-topnav-logo">
            <span class="mini-topnav-name">Thắng IT</span>
        </a>
        <span class="mini-topnav-title">
            <i class="fa-solid fa-trophy text-gold"></i> FIFA World Cup 2026
        </span>
    </div>

    <!-- BACKGROUND EFFECTS -->
    <div class="stadium-bg"></div>
    <div class="glow-effect glow-purple"></div>
    <div class="glow-effect glow-cyan"></div>

    <!-- MAIN APP WRAPPER -->
    <div id="app-container" class="app-container">

        <!-- MAIN TABS CONTAINER -->
        <main class="content-area">
            <!-- BRACKET SECTION -->
            <section id="tab-bracket" class="tab-content bracket-container">
                <div class="bracket-section-header" style="border-bottom: 2px solid var(--purple); margin-bottom: 20px;">
                    <h2><i class="fa-solid fa-sitemap text-purple"></i> Sơ Đồ Vòng Loại Trực Tiếp</h2>
                </div>
                <div class="bracket-tree-wrapper" id="bracket-tree-wrapper">
                    <div class="bracket-tree-inner" id="bracket-tree-inner">
                        <!-- Symmetrical tree columns loaded dynamically -->
                    </div>
                </div>
            </section>

            <!-- SCHEDULE SECTION -->
            <section id="tab-schedule" class="tab-content schedule-container hidden">
                <div class="bracket-section-header" style="border-bottom: 2px solid var(--cyan); margin-bottom: 16px;">
                    <h2><i class="fa-regular fa-calendar-days text-cyan"></i> Lịch Thi Đấu &amp; Kết Quả</h2>
                </div>
                <!-- Schedule sub-tabs -->
                <div class="schedule-subtabs">
                    <button class="schedule-subtab" data-subtab="sub-group">Vòng Bảng</button>
                    <button class="schedule-subtab active" data-subtab="sub-knockout">Vòng Loại Trực Tiếp</button>
                </div>
                <div id="sub-group" class="schedule-subcontent hidden">
                    <!-- Group matches -->
                </div>
                <div id="sub-knockout" class="schedule-subcontent animate-fade-in">
                    <!-- Knockout matches -->
                </div>
            </section>

            <!-- STANDINGS SECTION -->
            <section id="tab-standings" class="tab-content standings-section hidden" style="margin-top: 40px;">
                <div class="bracket-section-header" style="border-bottom: 2px solid var(--gold); margin-bottom: 20px;">
                    <h2><i class="fa-solid fa-table-list text-gold"></i> Bảng Xếp Hạng Vòng Bảng</h2>
                </div>
                <div id="standings-container" class="standings-grid animate-fade-in">
                    <!-- Group boards loaded dynamically -->
                </div>
            </section>
        </main>
    </div>

    <!-- BOTTOM NAV BAR -->
    <nav class="bottom-nav">
        <button class="nav-item" data-tab="tab-schedule">
            <i class="fa-regular fa-calendar-days"></i>
            <span>Lịch đấu</span>
        </button>
        <button class="nav-item active" data-tab="tab-bracket">
            <i class="fa-solid fa-sitemap"></i>
            <span>Vòng Loại</span>
        </button>
        <button class="nav-item" data-tab="tab-standings">
            <i class="fa-solid fa-table-list"></i>
            <span>Vòng Bảng</span>
        </button>
    </nav>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- JS Files -->
    <script src="{{ url_for('wc2026.static', filename='js/app.js') }}"></script>
</body>
</html>
